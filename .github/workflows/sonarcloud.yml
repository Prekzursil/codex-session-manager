name: SonarCloud

permissions:
  contents: read
  pull-requests: read

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, synchronize, reopened]
    branches: [main]
  workflow_dispatch:

jobs:
  sonarcloud:
    name: SonarCloud Code Analysis
    runs-on: windows-latest
    steps:
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Cache SonarQube packages
        uses: actions/cache@v4
        with:
          path: ~\.sonar\cache
          key: ${{ runner.os }}-sonar
          restore-keys: ${{ runner.os }}-sonar

      - name: Cache SonarQube scanner
        id: cache-sonar-scanner
        uses: actions/cache@v4
        with:
          path: .\.sonar\scanner
          key: ${{ runner.os }}-sonar-scanner
          restore-keys: ${{ runner.os }}-sonar-scanner

      - name: Install SonarQube scanner
        if: steps.cache-sonar-scanner.outputs.cache-hit != 'true'
        shell: pwsh
        run: |
          New-Item -Path .\.sonar\scanner -ItemType Directory -Force | Out-Null
          dotnet tool update dotnet-sonarscanner --tool-path .\.sonar\scanner

      - name: Build and analyze
        shell: pwsh
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          $ErrorActionPreference = "Stop"
          $PSNativeCommandUseErrorActionPreference = $true
          $coverageRoot = Join-Path $PWD 'coverage\sonar'
          $coreCoverage = Join-Path $coverageRoot 'core\coverage.opencover.xml'
          $storageCoverage = Join-Path $coverageRoot 'storage\coverage.opencover.xml'
          $appCoverage = Join-Path $coverageRoot 'app\coverage.opencover.xml'
          New-Item -ItemType Directory -Force -Path (Split-Path $coreCoverage), (Split-Path $storageCoverage), (Split-Path $appCoverage) | Out-Null

          .\.sonar\scanner\dotnet-sonarscanner begin /k:"Prekzursil_codex-session-manager" /o:"prekzursil" /d:sonar.host.url="https://sonarcloud.io" /d:sonar.token="$env:SONAR_TOKEN" /d:sonar.qualitygate.wait=true /d:sonar.cs.opencover.reportsPaths="$coreCoverage,$storageCoverage,$appCoverage"
          dotnet build CodexSessionManager.sln --configuration Release
          dotnet test .\tests\CodexSessionManager.Core.Tests\CodexSessionManager.Core.Tests.csproj --configuration Release --no-build /p:CollectCoverage=true /p:CoverletOutputFormat=opencover /p:CoverletOutput="$coreCoverage"
          dotnet test .\tests\CodexSessionManager.Storage.Tests\CodexSessionManager.Storage.Tests.csproj --configuration Release --no-build /p:CollectCoverage=true /p:CoverletOutputFormat=opencover /p:CoverletOutput="$storageCoverage"
          dotnet test .\tests\CodexSessionManager.App.Tests\CodexSessionManager.App.Tests.csproj --configuration Release --no-build /p:CollectCoverage=true /p:CoverletOutputFormat=opencover /p:CoverletOutput="$appCoverage"
          .\.sonar\scanner\dotnet-sonarscanner end /d:sonar.token="$env:SONAR_TOKEN"
