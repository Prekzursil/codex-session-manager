name: Quality Zero Gate

permissions:
  contents: read

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  aggregate-gate:
    permissions:
      contents: read
    uses: Prekzursil/quality-zero-platform/.github/workflows/reusable-quality-zero-gate.yml@977a49739e43a4c752d8067e15020e3f06934ac7
    with:
      repo_slug: ${{ github.repository }}
      event_name: ${{ github.event_name }}
      sha: ${{ github.event.pull_request.head.sha || github.sha }}
      platform_repository: Prekzursil/quality-zero-platform
      platform_ref: 977a49739e43a4c752d8067e15020e3f06934ac7
