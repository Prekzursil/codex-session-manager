name: Quality Zero Gate

permissions:
  contents: read

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  aggregate-gate:
    permissions:
      contents: read
    uses: Prekzursil/quality-zero-platform/.github/workflows/reusable-quality-zero-gate.yml@1323b063f556f44fd6f98e831949d0efeb92d451
    with:
      repo_slug: ${{ github.repository }}
      event_name: ${{ github.event_name }}
      sha: ${{ github.event.pull_request.head.sha || github.sha }}
      platform_repository: Prekzursil/quality-zero-platform
      platform_ref: 1323b063f556f44fd6f98e831949d0efeb92d451
