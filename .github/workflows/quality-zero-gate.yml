name: Quality Zero Gate

permissions:
  contents: read

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  aggregate-gate:
    permissions:
      contents: read
    uses: Prekzursil/quality-zero-platform/.github/workflows/reusable-quality-zero-gate.yml@1ac3b68d3b8289dc46a2dd75007f5eb1e3d44e09
    with:
      repo_slug: ${{ github.repository }}
      event_name: ${{ github.event_name }}
      sha: ${{ github.event.pull_request.head.sha || github.sha }}
      platform_repository: Prekzursil/quality-zero-platform
      platform_ref: 1ac3b68d3b8289dc46a2dd75007f5eb1e3d44e09
