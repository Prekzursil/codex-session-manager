name: Codecov Analytics

permissions:
  contents: read
  id-token: write

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  shared-codecov-analytics:
    permissions:
      contents: read
      id-token: write
    uses: Prekzursil/quality-zero-platform/.github/workflows/reusable-codecov-analytics.yml@378e60c9867de5427dd06b44497b065732c8c66d
    with:
      repo_slug: ${{ github.repository }}
      event_name: ${{ github.event_name }}
      sha: ${{ github.event.pull_request.head.sha || github.sha }}
      runner: windows-latest
      platform_repository: Prekzursil/quality-zero-platform
      platform_ref: 3d8af96f9aecf0e23c60092da4c68856fa9c7952
    secrets:
      CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
