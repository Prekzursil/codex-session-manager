name: Codecov Analytics

permissions:
  contents: read
  id-token: write

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  shared-codecov-analytics:
    permissions:
      contents: read
      id-token: write
    uses: Prekzursil/quality-zero-platform/.github/workflows/reusable-codecov-analytics.yml@b2110d2d0e84d95c282e9e51a15daa19b3b44568
    with:
      repo_slug: ${{ github.repository }}
      event_name: ${{ github.event_name }}
      sha: ${{ github.event.pull_request.head.sha || github.sha }}
      runner: windows-latest
      platform_repository: Prekzursil/quality-zero-platform
      platform_ref: ab80e05c2acee987ad17d98e960c59966a4393eb
    secrets:
      CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
