name: Codecov Analytics

permissions:
  contents: read
  id-token: write

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  shared-codecov-analytics:
    permissions:
      contents: read
      id-token: write
    uses: Prekzursil/quality-zero-platform/.github/workflows/reusable-codecov-analytics.yml@1694e5ec88e2df0f338727fe55b3f2a940d5023d
    with:
      repo_slug: ${{ github.repository }}
      event_name: ${{ github.event_name }}
      sha: ${{ github.event.pull_request.head.sha || github.sha }}
      runner: windows-latest
      platform_repository: Prekzursil/quality-zero-platform
      platform_ref: 1694e5ec88e2df0f338727fe55b3f2a940d5023d
    secrets:
      CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
