name: quality-zero-ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-test:
    name: build-test
    runs-on: windows-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 8.0.x
      - name: Restore
        run: dotnet restore CodexSessionManager.sln
      - name: Build
        run: dotnet build CodexSessionManager.sln --configuration Release --no-restore
      - name: Test with coverage
        run: dotnet test CodexSessionManager.sln --configuration Release --no-build --collect:"XPlat Code Coverage"
      - name: Publish app artifact
        run: dotnet publish src/CodexSessionManager.App/CodexSessionManager.App.csproj -c Release -r win-x64 --self-contained true -o publish/win-x64
      - name: Prepare artifacts directory
        shell: pwsh
        run: New-Item -ItemType Directory -Force -Path artifacts | Out-Null
      - name: Zip portable artifact
        shell: pwsh
        run: Compress-Archive -Path publish/win-x64/* -DestinationPath artifacts/CodexSessionManager-portable-win-x64.zip -Force
      - uses: actions/upload-artifact@v7
        with:
          name: CodexSessionManager-portable-win-x64
          path: artifacts/CodexSessionManager-portable-win-x64.zip

  quality-zero-gate:
    name: quality-zero-gate
    runs-on: ubuntu-latest
    needs:
      - build-test
    steps:
      - run: echo "All local repository quality gates passed."
