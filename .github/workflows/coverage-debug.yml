name: coverage-debug

on:
  push:
    branches:
      - codex/strict-zero-csm-refresh

jobs:
  app-coverage-debug:
    runs-on: windows-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 8.0.x
      - name: Restore
        run: dotnet restore CodexSessionManager.sln
      - name: Build
        run: dotnet build CodexSessionManager.sln --configuration Release --no-restore
      - name: Run App Coverage
        shell: pwsh
        run: |
          $coveragePath = Join-Path $PWD 'coverage\app\coverage.cobertura.xml'
          New-Item -ItemType Directory -Force -Path (Split-Path $coveragePath) | Out-Null
          dotnet test .\tests\CodexSessionManager.App.Tests\CodexSessionManager.App.Tests.csproj --configuration Release --no-build /p:CollectCoverage=true /p:CoverletOutputFormat=cobertura /p:CoverletOutput="$coveragePath"
      - name: Print Uncovered App Lines
        shell: pwsh
        run: |
          [xml]$coverage = Get-Content (Join-Path $PWD 'coverage\app\coverage.cobertura.xml')
          $classes = $coverage.coverage.packages.package.classes.class
          foreach ($class in $classes) {
            $filename = $class.filename
            $zeroHits = @($class.lines.line | Where-Object { $_.hits -eq '0' })
            $partialBranches = @($class.lines.line | Where-Object { $_.branch -eq 'True' -and $_.'condition-coverage' -notlike '100%*' })
            if ($zeroHits.Count -eq 0 -and $partialBranches.Count -eq 0) {
              continue
            }

            Write-Host "FILE: $filename"
            foreach ($line in $zeroHits) {
              Write-Host ("  UNCOVERED line {0}" -f $line.number)
            }

            foreach ($line in $partialBranches) {
              Write-Host ("  PARTIAL branch line {0}: {1}" -f $line.number, $line.'condition-coverage')
            }
          }
